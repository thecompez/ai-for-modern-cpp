name: CI

on:
  push:
  pull_request:

jobs:
  macos:
    name: macOS Clang project modules
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: brew install cmake llvm ninja

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm)/bin/clang++"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --no-tests=error

  linux-fedora:
    name: Fedora 43 GCC project modules
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - name: Install toolchain
        run: |
          dnf install --assumeyes \
            gcc-c++ \
            git \
            cmake \
            ninja-build

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure, build, and test
        env:
          AIMCPP_BUILD_DIRECTORY: ${{ github.workspace }}/build/fedora
          AIMCPP_CMAKE: /usr/bin/cmake
        run: bash scripts/verify-linux.sh

  linux-ubuntu:
    name: Ubuntu 25.10 GCC project modules
    runs-on: ubuntu-latest
    container: ubuntu:25.10

    steps:
      - name: Install toolchain
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install --yes \
            cmake \
            g++ \
            git \
            ninja-build

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure, build, and test
        env:
          AIMCPP_BUILD_DIRECTORY: ${{ github.workspace }}/build/ubuntu
          AIMCPP_CMAKE: /usr/bin/cmake
        run: bash scripts/verify-linux.sh
