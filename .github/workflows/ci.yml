name: CI

on:
  push:
  pull_request:

jobs:
  macos:
    name: macOS import std
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM and Ninja
        run: |
          brew install llvm ninja

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm)/bin/clang++"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --no-tests=error

  linux-fedora:
    name: Fedora 43 GCC 15 import std
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - name: Install base toolchain
        run: |
          dnf install --assumeyes \
            gcc-c++ \
            git \
            ninja-build \
            python3 \
            python3-pip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install supported CMake
        run: bash scripts/bootstrap-linux-cmake.sh

      - name: Configure, build, and test
        run: bash scripts/verify-linux.sh

  linux-ubuntu:
    name: Ubuntu 25.10 GCC 15 repaired metadata
    runs-on: ubuntu-latest
    container: ubuntu:25.10

    steps:
      - name: Install base toolchain
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install --yes \
            g++ \
            git \
            ninja-build \
            python3-venv

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install supported CMake
        run: bash scripts/bootstrap-linux-cmake.sh

      - name: Configure, build, and test
        run: bash scripts/verify-linux.sh
